<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MechReady — FX Gallery (20 Full-Screen Effects)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Nunito',sans-serif;background:#0a0a0a;color:#fff;padding:40px 20px 80px;}
  h1{text-align:center;font-size:26px;font-weight:900;margin-bottom:4px;}
  .sub{text-align:center;font-size:12px;color:#555;margin-bottom:40px;}
  .g{display:flex;flex-wrap:wrap;justify-content:center;gap:32px;}
  .cw{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .cl{font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:1px;text-align:center;max-width:200px;}
  .sec{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:2.5px;color:#444;margin:56px 0 28px;text-align:center;}

  /* Phone frame */
  .ph{width:220px;height:440px;border-radius:28px;overflow:hidden;border:2px solid #2a2a2a;position:relative;box-shadow:0 16px 60px rgba(0,0,0,0.5);flex-shrink:0;background:#1a1a2e;}
  .fx{position:absolute;inset:0;overflow:hidden;}

  /* ═══════════════════════════ */
  /* FX 1: Rising Bubbles       */
  /* ═══════════════════════════ */
  .bubble{position:absolute;border-radius:50%;background:rgba(255,255,255,0.15);animation:rise var(--d,6s) var(--dl,0s) infinite ease-in-out;}
  @keyframes rise{0%{opacity:0;transform:translateY(100%) scale(0.5)}10%{opacity:0.7}80%{opacity:0.3}100%{opacity:0;transform:translateY(-120%) scale(1.1)}}

  /* FX 2: Confetti Rain */
  .confetti{position:absolute;width:8px;height:8px;border-radius:2px;animation:confetti-fall var(--d,3s) var(--dl,0s) infinite linear;}
  @keyframes confetti-fall{0%{opacity:1;transform:translateY(-20px) rotate(0deg)}100%{opacity:0.3;transform:translateY(460px) rotate(720deg)}}

  /* FX 3: Star Burst */
  .star{position:absolute;animation:star-pop var(--d,2s) var(--dl,0s) infinite ease-out;}
  .star::before{content:'★';font-size:var(--sz,16px);color:var(--c,#FFC800);}
  @keyframes star-pop{0%{opacity:0;transform:scale(0) rotate(0deg)}20%{opacity:1;transform:scale(1.2) rotate(30deg)}60%{opacity:0.8;transform:scale(0.9) rotate(60deg)}100%{opacity:0;transform:scale(0.5) rotate(90deg) translateY(-40px)}}

  /* FX 4: Floating Hearts */
  .heart{position:absolute;animation:heart-float var(--d,4s) var(--dl,0s) infinite ease-in-out;}
  .heart::before{content:'♥';font-size:var(--sz,18px);color:var(--c,#FF4B4B);}
  @keyframes heart-float{0%{opacity:0;transform:translateY(0) scale(0.3)}15%{opacity:0.9}50%{transform:translateY(-120px) translateX(var(--dx,15px)) scale(1)}100%{opacity:0;transform:translateY(-250px) translateX(calc(var(--dx)*2)) scale(0.6)}}

  /* FX 5: Sparkle Dust */
  .sparkle{position:absolute;width:var(--sz,4px);height:var(--sz,4px);border-radius:50%;background:var(--c,white);animation:sparkle-pop var(--d,1.5s) var(--dl,0s) infinite ease-out;}
  @keyframes sparkle-pop{0%{opacity:0;transform:scale(0)}30%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(0) translate(var(--dx,10px),var(--dy,-10px))}}

  /* FX 6: Firework Burst */
  .fw-dot{position:absolute;width:4px;height:4px;border-radius:50%;animation:fw-burst var(--d,2s) var(--dl,0s) infinite ease-out;}
  @keyframes fw-burst{0%{opacity:0;transform:translate(0,0) scale(0)}10%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--fx,50px),var(--fy,-50px)) scale(0.3)}}

  /* FX 7: Snow Fall */
  .snow{position:absolute;border-radius:50%;background:white;opacity:0.7;animation:snow-fall var(--d,5s) var(--dl,0s) infinite linear;}
  @keyframes snow-fall{0%{transform:translateY(-10px) translateX(0) rotate(0deg);opacity:0.8}50%{transform:translateY(220px) translateX(var(--dx,20px)) rotate(180deg);opacity:0.6}100%{transform:translateY(460px) translateX(0) rotate(360deg);opacity:0}}

  /* FX 8: Lightning Flash */
  .flash{position:absolute;inset:0;background:white;opacity:0;animation:flash-pop var(--d,4s) var(--dl,0s) infinite ease-out;}
  @keyframes flash-pop{0%{opacity:0}2%{opacity:0.6}4%{opacity:0}6%{opacity:0.3}8%{opacity:0}100%{opacity:0}}

  /* FX 9: Radial Pulse */
  .pulse-ring{position:absolute;border-radius:50%;border:2px solid var(--c,rgba(255,255,255,0.3));animation:pulse-expand var(--d,2s) var(--dl,0s) infinite ease-out;}
  @keyframes pulse-expand{0%{opacity:0.8;transform:scale(0)}100%{opacity:0;transform:scale(3)}}

  /* FX 10: Vertical Streaks */
  .streak{position:absolute;width:2px;background:linear-gradient(to bottom,transparent,var(--c,rgba(255,255,255,0.4)),transparent);animation:streak-down var(--d,1s) var(--dl,0s) infinite linear;}
  @keyframes streak-down{0%{opacity:0;transform:translateY(-100%)}50%{opacity:0.8}100%{opacity:0;transform:translateY(500px)}}

  /* FX 11: Swirl Orbs */
  .orb{position:absolute;border-radius:50%;filter:blur(2px);animation:orb-swirl var(--d,6s) var(--dl,0s) infinite ease-in-out;}
  @keyframes orb-swirl{0%{transform:translate(0,0) scale(0.8);opacity:0.4}25%{transform:translate(40px,-60px) scale(1.1);opacity:0.7}50%{transform:translate(-20px,-100px) scale(0.9);opacity:0.5}75%{transform:translate(-40px,-40px) scale(1);opacity:0.6}100%{transform:translate(0,0) scale(0.8);opacity:0.4}}

  /* FX 12: Diagonal Rain */
  .drain{position:absolute;width:2px;height:20px;border-radius:1px;background:var(--c,rgba(255,255,255,0.3));transform:rotate(20deg);animation:drain-fall var(--d,1.5s) var(--dl,0s) infinite linear;}
  @keyframes drain-fall{0%{opacity:0;transform:rotate(20deg) translate(-40px,-20px)}20%{opacity:0.6}100%{opacity:0;transform:rotate(20deg) translate(80px,500px)}}

  /* FX 13: Floating Emojis */
  .emo{position:absolute;animation:emo-rise var(--d,4s) var(--dl,0s) infinite ease-in-out;font-size:var(--sz,22px);}
  @keyframes emo-rise{0%{opacity:0;transform:translateY(20px) scale(0.5) rotate(-10deg)}15%{opacity:1}60%{opacity:0.8;transform:translateY(-200px) scale(1) rotate(10deg)}100%{opacity:0;transform:translateY(-350px) scale(0.7) rotate(20deg)}}

  /* FX 14: Glitch Lines */
  .glitch{position:absolute;left:0;right:0;height:2px;background:rgba(255,255,255,0.5);animation:glitch-flick var(--d,3s) var(--dl,0s) infinite steps(1);}
  @keyframes glitch-flick{0%{opacity:0;transform:translateX(0)}5%{opacity:0.8;transform:translateX(-5px)}10%{opacity:0;transform:translateX(3px)}15%{opacity:0.6;transform:translateX(-2px)}20%{opacity:0}100%{opacity:0}}

  /* FX 15: Bokeh */
  .bokeh{position:absolute;border-radius:50%;background:var(--c,rgba(255,255,255,0.1));animation:bokeh-drift var(--d,8s) var(--dl,0s) infinite ease-in-out;}
  @keyframes bokeh-drift{0%{transform:translate(0,0);opacity:0.1}33%{transform:translate(var(--dx,20px),var(--dy,-30px));opacity:0.3}66%{transform:translate(calc(var(--dx)*-1),calc(var(--dy)*-0.5));opacity:0.15}100%{transform:translate(0,0);opacity:0.1}}

  /* FX 16: Comet Trail */
  .comet{position:absolute;width:3px;height:3px;border-radius:50%;background:white;box-shadow:0 0 6px 2px rgba(255,255,255,0.4);animation:comet-fly var(--d,3s) var(--dl,0s) infinite ease-in;}
  @keyframes comet-fly{0%{opacity:0;transform:translate(-50px,500px)}30%{opacity:1}100%{opacity:0;transform:translate(300px,-100px)}}

  /* FX 17: Wave Bars */
  .wbar{position:absolute;bottom:0;width:4px;border-radius:2px;background:var(--c,rgba(255,255,255,0.3));animation:wbar-bounce var(--d,1.5s) var(--dl,0s) infinite ease-in-out alternate;}
  @keyframes wbar-bounce{0%{height:10px;opacity:0.3}100%{height:var(--h,80px);opacity:0.7}}

  /* FX 18: Pixel Grid */
  .pix{position:absolute;width:6px;height:6px;border-radius:1px;animation:pix-pop var(--d,2s) var(--dl,0s) infinite ease-out;}
  @keyframes pix-pop{0%{opacity:0;transform:scale(0)}20%{opacity:0.8;transform:scale(1)}50%{opacity:0.6}100%{opacity:0;transform:scale(0.3) translateY(-20px)}}

  /* FX 19: DNA Helix */
  .dna{position:absolute;width:6px;height:6px;border-radius:50%;animation:dna-spin var(--d,3s) var(--dl,0s) infinite linear;}
  @keyframes dna-spin{0%{transform:translate(calc(20px * cos(0)),0);opacity:0.3}25%{transform:translate(calc(-20px),calc(-110px));opacity:0.8}50%{transform:translate(20px,calc(-220px));opacity:0.3}75%{transform:translate(-20px,calc(-330px));opacity:0.8}100%{transform:translate(20px,calc(-440px));opacity:0}}

  /* FX 20: Smoke Wisps */
  .smoke{position:absolute;border-radius:50%;background:radial-gradient(circle,var(--c,rgba(255,255,255,0.15)),transparent);animation:smoke-rise var(--d,6s) var(--dl,0s) infinite ease-out;}
  @keyframes smoke-rise{0%{opacity:0;transform:translateY(0) scale(0.5)}20%{opacity:0.4}60%{transform:translateY(-150px) translateX(var(--dx,30px)) scale(2);opacity:0.2}100%{opacity:0;transform:translateY(-300px) translateX(calc(var(--dx)*2)) scale(3)}}
</style>
</head>
<body>

<h1>fx gallery</h1>
<p class="sub">20 full-screen effects for MechReady modals and celebrations. Click to preview full-screen.</p>

<div class="sec">particle effects</div>
<div class="g" id="gallery"></div>

<div id="fullscreen" style="display:none;position:fixed;inset:0;z-index:100;cursor:pointer;" onclick="this.style.display='none'">
  <div style="position:absolute;top:20px;right:20px;z-index:101;background:rgba(0,0,0,0.5);color:#fff;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700;">click anywhere to close</div>
</div>

<script>
// Helper: inject a unique per-element keyframe so nothing syncs
let _uid = 0;
function uid() { return 'fx' + (++_uid); }
function injectKF(name, css) {
  const s = document.createElement('style');
  s.textContent = `@keyframes ${name}{${css}}`;
  document.head.appendChild(s);
  return name;
}
function R(min,max){ return min+Math.random()*(max-min); }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

const effects = [

// ── 1. Rising Bubbles ──
{
  name: 'Rising Bubbles',
  bg: '#1a1a2e',
  gen(el) {
    for(let i=0;i<25;i++){
      const b=document.createElement('div');
      const s=R(4,18), x=R(0,100), drift=R(-30,30), dur=R(5,12), dl=R(0,10);
      const id=uid();
      injectKF(id,`0%{opacity:0;transform:translateY(0) translateX(0) scale(${R(.4,.7)})}12%{opacity:${R(.3,.7)}}50%{transform:translateY(-50%) translateX(${drift}px)}88%{opacity:${R(.1,.4)}}100%{opacity:0;transform:translateY(-110%) translateX(${drift*R(.5,2)}px) scale(${R(.8,1.3)})}`);
      Object.assign(b.style,{position:'absolute',borderRadius:'50%',width:s+'px',height:s+'px',left:x+'%',bottom:R(-5,15)+'%',background:`rgba(255,255,255,${R(.06,.2)})`,animation:`${id} ${dur}s ${dl}s infinite ease-in-out`});
      el.appendChild(b);
    }
  }
},

// ── 2. Confetti Rain ──
{
  name: 'Confetti Rain',
  bg: '#1a1a2e',
  gen(el) {
    const colors=['#FF4B4B','#FFC800','#58CC02','#1CB0F6','#CE82FF','#FF9600','#FFAADE'];
    for(let i=0;i<45;i++){
      const c=document.createElement('div');
      const w=R(4,10),h=R(3,8),x=R(-5,105),dur=R(2,5.5),dl=R(0,6),drift=R(-40,40),spin=R(360,1440);
      const id=uid();
      injectKF(id,`0%{opacity:1;transform:translateY(-20px) translateX(0) rotate(0deg)}50%{transform:translateY(240px) translateX(${drift*.6}px) rotate(${spin*.5}deg)}100%{opacity:${R(.1,.4)};transform:translateY(500px) translateX(${drift}px) rotate(${spin}deg)}`);
      Object.assign(c.style,{position:'absolute',width:w+'px',height:h+'px',left:x+'%',top:'-3%',background:pick(colors),borderRadius:Math.random()>.5?'50%':'2px',animation:`${id} ${dur}s ${dl}s infinite linear`});
      el.appendChild(c);
    }
  }
},

// ── 3. Gold Star Burst ──
{
  name: 'Gold Star Burst',
  bg: 'linear-gradient(180deg,#1a1a2e,#2d1b4e)',
  gen(el) {
    for(let i=0;i<18;i++){
      const s=document.createElement('div');
      const x=R(5,90),y=R(5,85),sz=R(10,26),dur=R(1.5,4),dl=R(0,6),drift=R(-20,20);
      const id=uid();
      injectKF(id,`0%{opacity:0;transform:scale(0) rotate(0deg)}${R(15,25)}%{opacity:1;transform:scale(${R(1,1.4)}) rotate(${R(20,60)}deg)}${R(50,70)}%{opacity:${R(.5,.9)};transform:scale(${R(.7,1)}) rotate(${R(40,90)}deg) translateY(${drift}px)}100%{opacity:0;transform:scale(${R(.2,.5)}) rotate(${R(60,120)}deg) translateY(${drift*2}px)}`);
      s.style.cssText=`position:absolute;left:${x}%;top:${y}%;animation:${id} ${dur}s ${dl}s infinite ease-out;`;
      s.innerHTML=`<span style="font-size:${sz}px;color:${pick(['#FFC800','#FFB100','#FBE56D','#FF9600'])}">★</span>`;
      el.appendChild(s);
    }
  }
},

// ── 4. Floating Hearts ──
{
  name: 'Floating Hearts',
  bg: 'linear-gradient(180deg,#2d1020,#1a1a2e)',
  gen(el) {
    for(let i=0;i<16;i++){
      const h=document.createElement('div');
      const x=R(0,95),sz=R(12,28),dur=R(3,8),dl=R(0,8),driftX=R(-50,50),riseY=R(200,400);
      const id=uid();
      injectKF(id,`0%{opacity:0;transform:translateY(0) translateX(0) scale(${R(.2,.5)}) rotate(${R(-20,20)}deg)}${R(10,20)}%{opacity:${R(.7,1)}}50%{transform:translateY(-${riseY*.5}px) translateX(${driftX*.7}px) scale(${R(.8,1.1)}) rotate(${R(-10,10)}deg)}100%{opacity:0;transform:translateY(-${riseY}px) translateX(${driftX}px) scale(${R(.3,.7)}) rotate(${R(-30,30)}deg)}`);
      h.style.cssText=`position:absolute;left:${x}%;bottom:${R(-5,15)}%;animation:${id} ${dur}s ${dl}s infinite ease-in-out;font-size:${sz}px;color:${pick(['#FF4B4B','#FF7878','#FFAADE','#FFB2B2'])};`;
      h.textContent='♥';
      el.appendChild(h);
    }
  }
},

// ── 5. Sparkle Dust ──
{
  name: 'Sparkle Dust',
  bg: '#1a1a2e',
  gen(el) {
    for(let i=0;i<35;i++){
      const s=document.createElement('div');
      const sz=R(2,6),x=R(0,100),y=R(0,100),dur=R(1,3.5),dl=R(0,5),dx=R(-25,25),dy=R(-25,25);
      const id=uid();
      injectKF(id,`0%{opacity:0;transform:scale(0) translate(0,0)}${R(20,40)}%{opacity:${R(.6,1)};transform:scale(${R(.8,1.3)})}100%{opacity:0;transform:scale(0) translate(${dx}px,${dy}px)}`);
      Object.assign(s.style,{position:'absolute',width:sz+'px',height:sz+'px',borderRadius:'50%',left:x+'%',top:y+'%',background:pick(['white','#FFC800','#84D8FF','#FFAADE','#58CC02']),animation:`${id} ${dur}s ${dl}s infinite ease-out`});
      el.appendChild(s);
    }
  }
},

// ── 6. Firework Burst ──
{
  name: 'Firework Burst',
  bg: '#0a0a1a',
  gen(el) {
    const colors=['#FF4B4B','#FFC800','#58CC02','#1CB0F6','#CE82FF','#FF9600'];
    for(let burst=0;burst<4;burst++){
      const cx=R(15,85),cy=R(15,75),burstDl=burst*R(1,2.5);
      for(let i=0;i<14;i++){
        const d=document.createElement('div');
        const angle=((i+R(-.3,.3))/14)*Math.PI*2;
        const dist=R(30,80),dur=R(1.5,3),dotDl=burstDl+R(0,.3);
        const id=uid();
        injectKF(id,`0%{opacity:0;transform:translate(0,0) scale(0)}8%{opacity:1;transform:translate(0,0) scale(${R(.8,1.3)})}100%{opacity:0;transform:translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px) scale(${R(.1,.4)})}`);
        Object.assign(d.style,{position:'absolute',width:R(3,6)+'px',height:R(3,6)+'px',borderRadius:'50%',left:cx+'%',top:cy+'%',background:pick(colors),animation:`${id} ${dur}s ${dotDl}s infinite ease-out`});
        el.appendChild(d);
      }
    }
  }
},

// ── 7. Gentle Snow ──
{
  name: 'Gentle Snow',
  bg: 'linear-gradient(180deg,#1a2a3a,#0a1520)',
  gen(el) {
    for(let i=0;i<35;i++){
      const s=document.createElement('div');
      const sz=R(2,5),x=R(-5,105),dur=R(4,10),dl=R(0,10),driftX=R(-40,40),driftMid=R(-20,20);
      const id=uid();
      injectKF(id,`0%{opacity:${R(.5,.9)};transform:translateY(-10px) translateX(0)}33%{transform:translateY(33%) translateX(${driftMid}px)}66%{transform:translateY(66%) translateX(${driftX}px)}100%{opacity:0;transform:translateY(110%) translateX(${driftMid}px)}`);
      Object.assign(s.style,{position:'absolute',width:sz+'px',height:sz+'px',borderRadius:'50%',left:x+'%',top:'-3%',background:'white',animation:`${id} ${dur}s ${dl}s infinite linear`});
      el.appendChild(s);
    }
  }
},

// ── 8. Lightning Flash ──
{
  name: 'Lightning Flash',
  bg: '#0a0a1a',
  gen(el) {
    for(let i=0;i<4;i++){
      const f=document.createElement('div');
      const dur=R(3,7),dl=R(0,5),t1=R(2,5),t2=t1+R(1,3),t3=t2+R(1,2);
      const id=uid();
      injectKF(id,`0%{opacity:0}${t1}%{opacity:${R(.4,.8)}}${t1+1}%{opacity:0}${t2}%{opacity:${R(.2,.5)}}${t2+0.8}%{opacity:0}${t3}%{opacity:${R(.1,.3)}}${t3+0.5}%{opacity:0}100%{opacity:0}`);
      Object.assign(f.style,{position:'absolute',inset:'0',background:'white',animation:`${id} ${dur}s ${dl}s infinite ease-out`});
      el.appendChild(f);
    }
  }
},

// ── 9. Radial Pulse ──
{
  name: 'Radial Pulse',
  bg: '#1a1a2e',
  gen(el) {
    const ringColors=['rgba(99,102,241,0.5)','rgba(168,85,247,0.4)','rgba(236,72,153,0.35)','rgba(6,182,212,0.4)','rgba(255,200,0,0.35)','rgba(88,204,2,0.3)'];
    for(let i=0;i<8;i++){
      const r=document.createElement('div');
      const sz=R(40,80),dur=R(1.5,3.5),dl=R(0,4),cx=R(30,70),cy=R(30,60);
      const id=uid();
      injectKF(id,`0%{opacity:${R(.5,.9)};transform:scale(0)}100%{opacity:0;transform:scale(${R(2,4)})}`);
      Object.assign(r.style,{position:'absolute',width:sz+'px',height:sz+'px',borderRadius:'50%',left:`calc(${cx}% - ${sz/2}px)`,top:`calc(${cy}% - ${sz/2}px)`,border:`${R(1.5,3)}px solid ${pick(ringColors)}`,animation:`${id} ${dur}s ${dl}s infinite ease-out`});
      el.appendChild(r);
    }
  }
},

// ── 10. Speed Streaks ──
{
  name: 'Speed Streaks',
  bg: 'linear-gradient(180deg,#1a1040,#0a0a1a)',
  gen(el) {
    for(let i=0;i<16;i++){
      const s=document.createElement('div');
      const h=R(30,140),x=R(-5,105),dur=R(.5,1.5),dl=R(0,5);
      const id=uid();
      injectKF(id,`0%{opacity:0;transform:translateY(-${h}px)}${R(30,50)}%{opacity:${R(.4,.9)}}100%{opacity:0;transform:translateY(${R(400,600)}px)}`);
      Object.assign(s.style,{position:'absolute',width:R(1,3)+'px',height:h+'px',borderRadius:'2px',left:x+'%',top:'-10%',background:`linear-gradient(to bottom,transparent,${pick(['rgba(99,102,241,0.5)','rgba(168,85,247,0.5)','rgba(255,200,0,0.4)','rgba(28,176,246,0.4)'])},transparent)`,animation:`${id} ${dur}s ${dl}s infinite linear`});
      el.appendChild(s);
    }
  }
},

// ── 11. Swirl Orbs ──
{
  name: 'Swirl Orbs',
  bg: '#1a1a2e',
  gen(el) {
    const colors=['rgba(99,102,241,0.25)','rgba(206,130,255,0.2)','rgba(255,170,222,0.18)','rgba(28,176,246,0.2)','rgba(255,200,0,0.15)','rgba(88,204,2,0.18)'];
    for(let i=0;i<10;i++){
      const o=document.createElement('div');
      const sz=R(25,70),x=R(5,90),y=R(5,90),dur=R(6,14),dl=R(0,6);
      const p1x=R(-60,60),p1y=R(-80,0),p2x=R(-50,50),p2y=R(-60,40),p3x=R(-40,40),p3y=R(-30,30);
      const id=uid();

    for(let i=0;i<50;i++){
      const d=document.createElement('div');
      const layer=i/50, orbitR=R(10,40)+layer*100, sz=R(1.5,4+layer*2);
      const speed=R(2,5), dl=R(0,8), startA=R(0,360);
      const yPos=85-layer*80;
      const id=uid();
      // Orbit at increasing radius as we go up
      injectKF(id,`0%{transform:rotate(${startA}deg) translateX(${orbitR}px) rotate(-${startA}deg);opacity:${R(.3,.7)}}50%{transform:rotate(${startA+180}deg) translateX(${orbitR*R(.8,1.2)}px) rotate(-${startA+180}deg);opacity:${R(.5,.9)}}100%{transform:rotate(${startA+360}deg) translateX(${orbitR}px) rotate(-${startA+360}deg);opacity:${R(.3,.7)}}`);
      Object.assign(d.style,{position:'absolute',width:sz+'px',height:sz+'px',borderRadius:'50%',left:'50%',top:yPos+'%',background:pick(['rgba(168,85,247,0.6)','rgba(99,102,241,0.5)','rgba(206,130,255,0.5)','rgba(28,176,246,0.4)','white']),animation:`${id} ${speed}s ${dl}s infinite linear`});
      el.appendChild(d);
    }
  }
},

// ── 27. Golden Rain + Coins ──
{
  name: 'Golden Rain + Coins',
  bg: 'linear-gradient(180deg,#1a1020,#0a0a0a)',
  gen(el) {
    // Gold dust rain
    for(let i=0;i<30;i++){
      const d=document.createElement('div');
      const x=R(-5,105),sz=R(2,5),dur=R(2,6),dl=R(0,8),driftX=R(-20,20);
      const id=uid();
      injectKF(id,`0%{opacity:0;transform:translateY(-10px) translateX(0)}${R(10,20)}%{opacity:${R(.4,.8)}}60%{transform:translateY(60%) translateX(${driftX}px)}100%{opacity:0;transform:translateY(110%) translateX(${driftX*1.5}px)}`);
      Object.assign(d.style,{position:'absolute',width:sz+'px',height:sz+'px',borderRadius:'50%',left:x+'%',top:'-3%',background:`rgba(255,200,0,${R(.3,.7)})`,animation:`${id} ${dur}s ${dl}s infinite linear`});
      el.appendChild(d);
    }
    // Falling coin emojis
    for(let i=0;i<10;i++){
      const c=document.createElement('div');
      const x=R(5,90),sz=R(16,28),dur=R(3,7),dl=R(0,10),spin=R(180,720),driftX=R(-30,30);
      const id=uid();
      injectKF(id,`0%{opacity:0;transform:translateY(-20px) translateX(0) rotate(0)}12%{opacity:1}50%{transform:translateY(50%) translateX(${driftX}px) rotate(${spin*.5}deg)}100%{opacity:0;transform:translateY(110%) translateX(${driftX*1.5}px) rotate(${spin}deg)}`);
      c.style.cssText=`position:absolute;left:${x}%;top:-5%;font-size:${sz}px;animation:${id} ${dur}s ${dl}s infinite linear;`;
      c.textContent=pick(['🪙','💰','✨','💎']);
      el.appendChild(c);
    }
  }
},

// ── 28. Electric Field (behind character) ──
{
  name: 'Electric Field',
  bg: '#0a0a1a',
  gen(el) {
    // Lightning bolts from center
    for(let i=0;i<12;i++){
      const b=document.createElement('div');
      const angle=R(0,Math.PI*2),len=R(60,160),dur=R(.3,1.2),dl=R(0,5);
      const endX=Math.cos(angle)*len,endY=Math.sin(angle)*len;
      const midX=endX*.5+R(-20,20),midY=endY*.5+R(-20,20);
      const id=uid();
      injectKF(id,`0%{opacity:0;clip-path:inset(0 100% 0 0)}8%{opacity:${R(.6,1)};clip-path:inset(0 0 0 0)}20%{opacity:${R(.3,.7)}}25%{opacity:0}100%{opacity:0}`);
      // Draw a jagged line using a thin rotated div
      const deg=Math.atan2(endY,endX)*180/Math.PI;
      Object.assign(b.style,{position:'absolute',width:len+'px',height:R(1.5,3)+'px',left:'50%',top:'42%',background:pick(['rgba(130,216,255,0.8)','rgba(99,102,241,0.7)','rgba(255,200,0,0.6)','white']),transformOrigin:'0 50%',transform:`rotate(${deg}deg)`,animation:`${id} ${dur}s ${dl}s infinite ease-out`,borderRadius:'1px',boxShadow:`0 0 ${R(4,10)}px ${pick(['rgba(130,216,255,0.4)','rgba(99,102,241,0.3)'])}`});
      el.appendChild(b);
    }
    // Center crackling orb
    const orb=document.createElement('div');
    const oid=uid();
    injectKF(oid,`0%{opacity:.4;transform:scale(.9)}25%{opacity:.7;transform:scale(1.1)}50%{opacity:.3;transform:scale(.95)}75%{opacity:.6;transform:scale(1.05)}100%{opacity:.4;transform:scale(.9)}`);
    Object.assign(orb.style,{position:'absolute',width:'50px',height:'50px',borderRadius:'50%',left:'calc(50% - 25px)',top:'calc(42% - 25px)',background:'radial-gradient(circle,rgba(130,216,255,0.4),transparent)',animation:`${oid} 1.5s 0s infinite ease-in-out`});
    el.appendChild(orb);
  }
},

// ── 29. Portal Warp (behind character) ──
{
  name: 'Portal Warp',
  bg: '#050510',
  gen(el) {
    // Concentric spinning rings at center
    for(let i=0;i<6;i++){
      const r=document.createElement('div');
      const sz=40+i*30,dur=R(3,8)*(i%2===0?1:-1),dl=R(0,3);
      const id=uid();
      const dir=i%2===0?'':'reverse';
      injectKF(id,`0%{transform:rotate(0deg)}100%{transform:rotate(${i%2===0?360:-360}deg)}`);
      Object.assign(r.style,{position:'absolute',width:sz+'px',height:sz+'px',borderRadius:'50%',left:`calc(50% - ${sz/2}px)`,top:`calc(42% - ${sz/2}px)`,border:`${R(1,2.5)}px solid transparent`,borderTopColor:pick(['rgba(168,85,247,0.5)','rgba(99,102,241,0.4)','rgba(206,130,255,0.5)','rgba(255,170,222,0.4)']),borderRightColor:pick(['rgba(168,85,247,0.3)','rgba(99,102,241,0.2)']),animation:`${id} ${Math.abs(dur)}s ${dl}s infinite linear`,opacity:R(.4,.8)});
      el.appendChild(r);
    }
    // Particles being sucked inward
    for(let i=0;i<20;i++){
      const p=document.createElement('div');
      const startAngle=R(0,Math.PI*2),startDist=R(150,250),sz=R(1.5,4),dur=R(2,5),dl=R(0,8);
      const id=uid();
      injectKF(id,`0%{opacity:0;transform:translate(${Math.cos(startAngle)*startDist}px,${Math.sin(startAngle)*startDist}px) scale(1)}20%{opacity:${R(.5,.9)}}90%{opacity:${R(.3,.6)}}100%{opacity:0;transform:translate(0,0) scale(0)}`);
      Object.assign(p.style,{position:'absolute',width:sz+'px',height:sz+'px',borderRadius:'50%',left:'50%',top:'42%',background:pick(['#CE82FF','#84D8FF','white','#FFAADE']),animation:`${id} ${dur}s ${dl}s infinite ease-in`});
      el.appendChild(p);
    }
  }
},

// ── 30. Level Up Rays (behind character) ──
{
  name: 'Level Up Rays',
  bg: '#0a0a1a',
  gen(el) {
    // Rotating light rays from center
    for(let i=0;i<12;i++){
      const ray=document.createElement('div');
      const angle=(i/12)*360, w=R(3,8), h=R(120,220);
      const id=uid();
      injectKF(id,`0%{opacity:${R(.1,.3)}}50%{opacity:${R(.3,.6)}}100%{opacity:${R(.1,.3)}}`);
      Object.assign(ray.style,{position:'absolute',width:w+'px',height:h+'px',left:'50%',top:'42%',transformOrigin:'50% 0',transform:`rotate(${angle}deg) translateX(-${w/2}px)`,background:`linear-gradient(to bottom,${pick(['rgba(255,200,0,0.4)','rgba(255,150,0,0.3)','rgba(255,255,255,0.2)'])},transparent)`,borderRadius:'3px',animation:`${id} ${R(2,5)}s ${R(0,3)}s infinite ease-in-out`});
      el.appendChild(ray);
    }
    // Slow rotation of entire ray group
    const wrap=document.createElement('div');
    const wid=uid();
    injectKF(wid,`0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}`);
    wrap.style.cssText=`position:absolute;inset:0;animation:${wid} 30s 0s infinite linear;`;
    // Move all rays into the wrapper
    const rays=[...el.children];
    rays.forEach(r=>wrap.appendChild(r));
    el.appendChild(wrap);
    // Center flash
    const c=document.createElement('div');
    const cid=uid();
    injectKF(cid,`0%{opacity:.2;transform:scale(.7)}50%{opacity:.6;transform:scale(1.2)}100%{opacity:.2;transform:scale(.7)}`);
    Object.assign(c.style,{position:'absolute',width:'80px',height:'80px',borderRadius:'50%',left:'calc(50% - 40px)',top:'calc(42% - 40px)',background:'radial-gradient(circle,rgba(255,200,0,0.4),rgba(255,150,0,0.15),transparent)',animation:`${cid} 2.5s 0s infinite ease-in-out`,zIndex:'2'});
    el.appendChild(c);
  }
},

];

// Render gallery
const gallery=document.getElementById('gallery');
const fullscreen=document.getElementById('fullscreen');

effects.forEach((fx,idx)=>{
  const wrap=document.createElement('div');
  wrap.className='cw';

  const phone=document.createElement('div');
  phone.className='ph';
  phone.style.cursor='pointer';
  phone.title='Click for fullscreen';

  const fxEl=document.createElement('div');
  fxEl.className='fx';
  fxEl.style.background=fx.bg;
  fx.gen(fxEl);
  phone.appendChild(fxEl);

  phone.addEventListener('click',()=>{
    fullscreen.style.display='block';
    fullscreen.style.background=fx.bg;
    // Clear old
    while(fullscreen.childElementCount>1) fullscreen.removeChild(fullscreen.lastChild);
    const fsEl=document.createElement('div');
    fsEl.style.cssText='position:absolute;inset:0;overflow:hidden;';
    fx.gen(fsEl);
    fullscreen.appendChild(fsEl);
  });

  const label=document.createElement('div');
  label.className='cl';
  label.textContent=`${idx+1}. ${fx.name}`;

  wrap.appendChild(phone);
  wrap.appendChild(label);
  gallery.appendChild(wrap);
});
</script>
</body>
</html>
