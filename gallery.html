<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MechReady — All Galleries</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: #0a0a0a; color: #fff; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

  /* Tab bar */
  .tab-bar {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 10px 16px;
    background: #111;
    border-bottom: 2px solid #222;
    flex-shrink: 0;
    overflow-x: auto;
  }
  .tab-bar::-webkit-scrollbar { height: 0; }
  .logo {
    font-size: 14px;
    font-weight: 900;
    color: #555;
    margin-right: 12px;
    white-space: nowrap;
    letter-spacing: -0.5px;
  }
  .tab {
    padding: 8px 16px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 700;
    color: #666;
    background: transparent;
    border: 1.5px solid transparent;
    cursor: pointer;
    white-space: nowrap;
    transition: all 150ms;
    user-select: none;
  }
  .tab:hover { color: #999; background: #1a1a1a; }
  .tab.active {
    color: #fff;
    background: #1e1e2e;
    border-color: #333;
  }
  .tab .badge {
    display: inline-block;
    margin-left: 6px;
    padding: 1px 6px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 800;
    background: #333;
    color: #888;
  }
  .tab.active .badge { background: #4F46E5; color: #fff; }

  /* Keyboard hint */
  .kbd-hint {
    margin-left: auto;
    font-size: 10px;
    color: #444;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .kbd-hint kbd {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 4px;
    background: #1a1a1a;
    border: 1px solid #333;
    font-family: 'Inter', monospace;
    font-size: 10px;
    color: #666;
  }

  /* iframe container */
  .frame-wrap { flex: 1; position: relative; }
  .frame-wrap iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    background: #0a0a0a;
    display: none;
  }
  .frame-wrap iframe.active { display: block; }
</style>
</head>
<body>

<div class="tab-bar">
  <span class="logo">MechReady</span>
  <button class="tab active" data-idx="0">Modals <span class="badge">UI</span></button>
  <button class="tab" data-idx="1">Mascots <span class="badge">PNG</span></button>
  <button class="tab" data-idx="2">Effects <span class="badge">FX</span></button>
  <button class="tab" data-idx="3">SVG Icons <span class="badge">SVG</span></button>
  <button class="tab" data-idx="4">Animated SVGs <span class="badge">SVG</span></button>
  <span class="kbd-hint"><kbd>1</kbd>-<kbd>5</kbd> to switch</span>
</div>

<div class="frame-wrap">
  <iframe class="active" src="modal-gallery.html" loading="lazy"></iframe>
  <iframe src="public/mascot-preview.html" loading="lazy"></iframe>
  <iframe src="fx-gallery.html" loading="lazy"></iframe>
  <iframe src="public/svg-gallery.html" loading="lazy"></iframe>
  <iframe src="designs/svg-gallery-animated.html" loading="lazy"></iframe>
</div>

<script>
  const tabs = document.querySelectorAll('.tab');
  const frames = document.querySelectorAll('.frame-wrap iframe');

  function switchTo(idx) {
    tabs.forEach((t, i) => t.classList.toggle('active', i === idx));
    frames.forEach((f, i) => f.classList.toggle('active', i === idx));
  }

  tabs.forEach(t => t.addEventListener('click', () => switchTo(+t.dataset.idx)));

  document.addEventListener('keydown', e => {
    const n = +e.key;
    if (n >= 1 && n <= 5) switchTo(n - 1);
  });
</script>
</body>
</html>
