<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Octokeen - Strategy Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0f;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .tab-bar {
    display: flex;
    background: #111118;
    border-bottom: 1px solid #1f2937;
    padding: 0 12px;
    flex-shrink: 0;
  }
  .tab {
    padding: 14px 24px;
    font-size: 14px;
    font-weight: 600;
    color: #6b7280;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s ease;
    user-select: none;
    white-space: nowrap;
  }
  .tab:hover {
    color: #9ca3af;
    background: rgba(255,255,255,0.02);
  }
  .tab.active {
    color: #e5e7eb;
    border-bottom-color: #818cf8;
  }
  .tab-content {
    flex: 1;
    position: relative;
  }
  .tab-content iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: none;
  }
  .tab-content iframe.active {
    display: block;
  }
  @media (max-width: 600px) {
    .tab { padding: 12px 14px; font-size: 12px; }
  }
</style>
</head>
<body>
  <div class="tab-bar">
    <div class="tab active" data-tab="0">Market Research</div>
    <div class="tab" data-tab="1">Conversion Plan</div>
    <div class="tab" data-tab="2">Play Store Checklist</div>
  </div>
  <div class="tab-content">
    <iframe class="active" src="market-research-report.html"></iframe>
    <iframe src="docs/conversion-plan.html"></iframe>
    <iframe src="android/play-store-checklist.html"></iframe>
  </div>
  <script>
    const tabs = document.querySelectorAll('.tab');
    const frames = document.querySelectorAll('.tab-content iframe');
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const idx = +tab.dataset.tab;
        tabs.forEach(t => t.classList.remove('active'));
        frames.forEach(f => f.classList.remove('active'));
        tab.classList.add('active');
        frames[idx].classList.add('active');
      });
    });
  </script>
</body>
</html>
