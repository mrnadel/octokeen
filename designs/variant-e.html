<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MechReady — Course Map (Variant E)</title>
<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  @font-face {
    font-family: 'System';
    src: local('-apple-system'), local('BlinkMacSystemFont'), local('Segoe UI'), local('Roboto');
  }

  :root {
    --rose: #E8457C;
    --rose-light: #F472A8;
    --rose-dark: #C0325F;
    --cyan: #06B6D4;
    --cyan-light: #38D9F5;
    --cyan-dark: #0891B2;
    --bg-top: #1E0533;
    --bg-bottom: #0C1445;
    --glass-bg: rgba(255, 255, 255, 0.06);
    --glass-border: rgba(255, 255, 255, 0.12);
    --glass-shadow: rgba(0, 0, 0, 0.3);
  }

  html { font-size: 16px; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: linear-gradient(160deg, var(--bg-top) 0%, #160B3A 30%, #0F1050 60%, var(--bg-bottom) 100%);
    min-height: 100vh;
    color: #fff;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Floating Background Orbs ── */
  .bg-orbs {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.35;
    animation: orbFloat 20s ease-in-out infinite alternate;
  }

  .orb-1 {
    width: 340px; height: 340px;
    background: radial-gradient(circle, var(--rose) 0%, transparent 70%);
    top: -60px; left: -80px;
    animation-duration: 22s;
  }
  .orb-2 {
    width: 280px; height: 280px;
    background: radial-gradient(circle, var(--cyan) 0%, transparent 70%);
    top: 40%; right: -100px;
    animation-duration: 18s;
    animation-delay: -5s;
  }
  .orb-3 {
    width: 220px; height: 220px;
    background: radial-gradient(circle, #7C3AED 0%, transparent 70%);
    bottom: 10%; left: 10%;
    animation-duration: 25s;
    animation-delay: -10s;
  }
  .orb-4 {
    width: 180px; height: 180px;
    background: radial-gradient(circle, var(--rose-light) 0%, transparent 70%);
    bottom: -40px; right: 20%;
    animation-duration: 16s;
    animation-delay: -3s;
  }
  .orb-5 {
    width: 160px; height: 160px;
    background: radial-gradient(circle, var(--cyan-light) 0%, transparent 70%);
    top: 20%; left: 50%;
    animation-duration: 28s;
    animation-delay: -8s;
    opacity: 0.2;
  }

  @keyframes orbFloat {
    0% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -20px) scale(1.05); }
    66% { transform: translate(-20px, 30px) scale(0.95); }
    100% { transform: translate(15px, 15px) scale(1.02); }
  }

  /* ── Layout Shell ── */
  .app-shell {
    position: relative;
    z-index: 1;
    max-width: 520px;
    margin: 0 auto;
    padding: 0 16px;
    min-height: 100vh;
  }

  /* ── Top Bar ── */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 4px;
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background: rgba(15, 10, 40, 0.6);
    margin: 0 -16px;
    padding: 16px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .top-bar-title {
    font-size: 1.15rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .top-bar-stats {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .stat-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.8rem;
    font-weight: 700;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 5px 12px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .stat-pill svg { flex-shrink: 0; }

  /* ── Overall Progress Banner ── */
  .progress-banner {
    margin: 20px 0 8px;
    padding: 16px 20px;
    border-radius: 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }

  .progress-banner-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .progress-banner-label {
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.55);
  }

  .progress-banner-pct {
    font-size: 0.85rem;
    font-weight: 800;
    color: var(--rose-light);
  }

  .progress-track-outer {
    height: 8px;
    border-radius: 4px;
    background: rgba(255,255,255,0.08);
    overflow: hidden;
  }

  .progress-track-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--rose) 0%, var(--cyan) 100%);
    transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
  }

  .progress-track-fill::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.3) 50%, transparent 100%);
    animation: shimmer 2.5s ease-in-out infinite;
  }

  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(200%); }
  }

  /* ── Unit Section ── */
  .unit-section {
    margin-top: 28px;
  }

  /* ── Unit Header Card ── */
  .unit-header {
    border-radius: 20px;
    padding: 22px 24px 18px;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.12);
  }

  .unit-header::before {
    content: '';
    position: absolute;
    inset: 0;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    z-index: 0;
  }

  .unit-header--rose {
    background: linear-gradient(135deg, rgba(232, 69, 124, 0.35) 0%, rgba(232, 69, 124, 0.15) 100%);
    box-shadow: 0 8px 32px rgba(232, 69, 124, 0.15), inset 0 1px 0 rgba(255,255,255,0.1);
  }

  .unit-header--cyan {
    background: linear-gradient(135deg, rgba(6, 182, 212, 0.35) 0%, rgba(6, 182, 212, 0.15) 100%);
    box-shadow: 0 8px 32px rgba(6, 182, 212, 0.15), inset 0 1px 0 rgba(255,255,255,0.1);
  }

  .unit-header > * { position: relative; z-index: 1; }

  .unit-header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 6px;
  }

  .unit-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 10px;
    font-size: 0.75rem;
    font-weight: 800;
    letter-spacing: 0.04em;
    flex-shrink: 0;
  }

  .unit-badge--rose {
    background: rgba(255,255,255,0.18);
    color: #fff;
  }

  .unit-badge--cyan {
    background: rgba(255,255,255,0.18);
    color: #fff;
  }

  .unit-title {
    font-size: 1.05rem;
    font-weight: 800;
    line-height: 1.25;
    color: #fff;
  }

  .unit-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
    margin-bottom: 8px;
  }

  .unit-meta-text {
    font-size: 0.75rem;
    font-weight: 600;
    color: rgba(255,255,255,0.65);
  }

  .unit-progress-bar {
    height: 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.12);
    overflow: hidden;
  }

  .unit-progress-fill--rose {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--rose-light), var(--rose));
    transition: width 0.4s ease;
  }

  .unit-progress-fill--cyan {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--cyan-light), var(--cyan));
    transition: width 0.4s ease;
  }

  /* ── Connector Line ── */
  .connector {
    display: flex;
    justify-content: center;
    padding: 4px 0;
  }

  .connector-line {
    width: 3px;
    height: 20px;
    border-radius: 2px;
    background: rgba(255,255,255,0.1);
  }

  /* ── Lesson Buttons (3D style) ── */
  .lesson-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 8px 0 4px;
  }

  .lesson-btn {
    position: relative;
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    border: none;
    cursor: pointer;
    background: none;
    padding: 0;
    text-align: left;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }

  .lesson-btn:active .lesson-face {
    transform: translateY(2px);
  }
  .lesson-btn:active .lesson-rim {
    height: 2px;
  }

  /* Rim (bottom shadow layer) */
  .lesson-rim {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 6px;
    border-radius: 16px;
    transition: height 0.1s ease;
  }

  .lesson-rim--rose {
    background: var(--rose-dark);
  }
  .lesson-rim--cyan {
    background: var(--cyan-dark);
  }
  .lesson-rim--gray {
    background: #2A2A3E;
  }

  /* Face (top layer) */
  .lesson-face {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 14px 18px;
    border-radius: 16px;
    transition: transform 0.1s ease, box-shadow 0.3s ease;
    border: 1px solid transparent;
  }

  /* ── Completed ── */
  .lesson-face--completed-rose {
    background: linear-gradient(135deg, rgba(232, 69, 124, 0.25) 0%, rgba(232, 69, 124, 0.12) 100%);
    border-color: rgba(232, 69, 124, 0.3);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .lesson-face--completed-cyan {
    background: linear-gradient(135deg, rgba(6, 182, 212, 0.25) 0%, rgba(6, 182, 212, 0.12) 100%);
    border-color: rgba(6, 182, 212, 0.3);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  /* ── Current / Active ── */
  .lesson-face--current-rose {
    background: linear-gradient(135deg, rgba(232, 69, 124, 0.4) 0%, rgba(232, 69, 124, 0.2) 100%);
    border-color: rgba(232, 69, 124, 0.5);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 0 20px rgba(232, 69, 124, 0.25), 0 0 60px rgba(232, 69, 124, 0.08);
    animation: currentPulse-rose 3s ease-in-out infinite;
  }

  .lesson-face--current-cyan {
    background: linear-gradient(135deg, rgba(6, 182, 212, 0.4) 0%, rgba(6, 182, 212, 0.2) 100%);
    border-color: rgba(6, 182, 212, 0.5);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 0 20px rgba(6, 182, 212, 0.25), 0 0 60px rgba(6, 182, 212, 0.08);
    animation: currentPulse-cyan 3s ease-in-out infinite;
  }

  @keyframes currentPulse-rose {
    0%, 100% {
      box-shadow: 0 0 20px rgba(232, 69, 124, 0.25), 0 0 60px rgba(232, 69, 124, 0.08);
      border-color: rgba(232, 69, 124, 0.5);
    }
    50% {
      box-shadow: 0 0 28px rgba(232, 69, 124, 0.4), 0 0 80px rgba(232, 69, 124, 0.15);
      border-color: rgba(232, 69, 124, 0.7);
    }
  }

  @keyframes currentPulse-cyan {
    0%, 100% {
      box-shadow: 0 0 20px rgba(6, 182, 212, 0.25), 0 0 60px rgba(6, 182, 212, 0.08);
      border-color: rgba(6, 182, 212, 0.5);
    }
    50% {
      box-shadow: 0 0 28px rgba(6, 182, 212, 0.4), 0 0 80px rgba(6, 182, 212, 0.15);
      border-color: rgba(6, 182, 212, 0.7);
    }
  }

  /* ── Locked ── */
  .lesson-face--locked {
    background: rgba(255, 255, 255, 0.04);
    border-color: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    opacity: 0.5;
    cursor: not-allowed;
  }

  .lesson-btn--locked { cursor: not-allowed; }
  .lesson-btn--locked:active .lesson-face { transform: none; }
  .lesson-btn--locked:active .lesson-rim { height: 6px; }

  /* ── Lesson Icon Circle ── */
  .lesson-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    flex-shrink: 0;
    position: relative;
  }

  .lesson-icon--completed-rose {
    background: linear-gradient(135deg, var(--rose), var(--rose-light));
    box-shadow: 0 4px 12px rgba(232, 69, 124, 0.3);
  }

  .lesson-icon--completed-cyan {
    background: linear-gradient(135deg, var(--cyan), var(--cyan-light));
    box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
  }

  .lesson-icon--current-rose {
    background: linear-gradient(135deg, var(--rose), var(--rose-light));
    box-shadow: 0 4px 16px rgba(232, 69, 124, 0.4);
  }

  .lesson-icon--current-cyan {
    background: linear-gradient(135deg, var(--cyan), var(--cyan-light));
    box-shadow: 0 4px 16px rgba(6, 182, 212, 0.4);
  }

  .lesson-icon--locked {
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.1);
  }

  .lesson-icon svg {
    width: 20px;
    height: 20px;
    fill: none;
    stroke: #fff;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .lesson-icon--locked svg {
    stroke: rgba(255,255,255,0.4);
  }

  /* ── Lesson Text ── */
  .lesson-info { flex: 1; min-width: 0; }

  .lesson-number {
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 2px;
  }

  .lesson-number--rose { color: var(--rose-light); }
  .lesson-number--cyan { color: var(--cyan-light); }
  .lesson-number--locked { color: rgba(255,255,255,0.25); }

  .lesson-name {
    font-size: 0.92rem;
    font-weight: 700;
    color: #fff;
    line-height: 1.3;
  }

  .lesson-face--locked .lesson-name {
    color: rgba(255,255,255,0.4);
  }

  /* ── Lesson Chevron / Status ── */
  .lesson-status {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    flex-shrink: 0;
  }

  .lesson-status svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: rgba(255,255,255,0.3);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ── Current Lesson Arrow CTA ── */
  .current-cta {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 4px;
    color: var(--rose-light);
    animation: ctaPulse 2s ease-in-out infinite;
  }

  .current-cta svg {
    width: 14px;
    height: 14px;
    fill: none;
    stroke: var(--rose-light);
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  @keyframes ctaPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  /* ── Unit Divider ── */
  .unit-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 32px 0 4px;
    padding: 0 4px;
  }

  .unit-divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
  }

  .unit-divider-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
  }

  /* ── Bottom Spacer ── */
  .bottom-spacer {
    height: 80px;
  }

  /* ── Floating Current Indicator ── */
  .current-indicator {
    position: absolute;
    left: -6px;
    top: 50%;
    transform: translateY(-50%);
    width: 4px;
    height: 32px;
    border-radius: 2px;
    background: var(--rose);
    box-shadow: 0 0 12px rgba(232, 69, 124, 0.5);
    animation: indicatorGlow 2.5s ease-in-out infinite;
  }

  @keyframes indicatorGlow {
    0%, 100% { box-shadow: 0 0 12px rgba(232, 69, 124, 0.5); opacity: 1; }
    50% { box-shadow: 0 0 20px rgba(232, 69, 124, 0.8); opacity: 0.8; }
  }

  /* ── Responsive ── */
  @media (max-width: 380px) {
    .unit-title { font-size: 0.95rem; }
    .lesson-face { padding: 12px 14px; gap: 12px; }
    .lesson-icon { width: 38px; height: 38px; }
    .lesson-name { font-size: 0.85rem; }
  }

  /* ── Entrance Animations ── */
  .unit-section {
    animation: fadeSlideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .unit-section:nth-child(2) {
    animation-delay: 0.15s;
  }

  .lesson-btn {
    animation: fadeSlideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .lesson-btn:nth-child(1) { animation-delay: 0.1s; }
  .lesson-btn:nth-child(2) { animation-delay: 0.18s; }
  .lesson-btn:nth-child(3) { animation-delay: 0.26s; }
  .lesson-btn:nth-child(4) { animation-delay: 0.34s; }
  .lesson-btn:nth-child(5) { animation-delay: 0.42s; }

  @keyframes fadeSlideUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
</style>
</head>
<body>

<!-- Background Orbs -->
<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
  <div class="orb orb-5"></div>
</div>

<div class="app-shell">

  <!-- Top Bar -->
  <header class="top-bar">
    <span class="top-bar-title">MechReady</span>
    <div class="top-bar-stats">
      <div class="stat-pill">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke="#FACC15" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span style="color:#FACC15">12</span>
      </div>
      <div class="stat-pill">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="#F97316" stroke-width="2"/>
          <path d="M12 6v6l4 2" stroke="#F97316" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span style="color:#F97316">3d</span>
      </div>
      <div class="stat-pill">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M6 9l6 6 6-6" stroke="#A78BFA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M6 5l6 6 6-6" stroke="#A78BFA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
        </svg>
        <span style="color:#A78BFA">Lv 4</span>
      </div>
    </div>
  </header>

  <!-- Overall Progress -->
  <div class="progress-banner">
    <div class="progress-banner-row">
      <span class="progress-banner-label">Course Progress</span>
      <span class="progress-banner-pct">2 / 7 lessons</span>
    </div>
    <div class="progress-track-outer">
      <div class="progress-track-fill" style="width: 28.5%"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════ -->
  <!-- UNIT 1: Statics & Free Body Diagrams    -->
  <!-- ═══════════════════════════════════════ -->
  <section class="unit-section">
    <div class="unit-header unit-header--rose">
      <div class="unit-header-top">
        <div class="unit-badge unit-badge--rose">U1</div>
        <div class="unit-title">Statics & Free Body Diagrams</div>
      </div>
      <div class="unit-meta">
        <span class="unit-meta-text">2 of 4 lessons completed</span>
        <span class="unit-meta-text" style="color:var(--rose-light); font-weight:800;">50%</span>
      </div>
      <div class="unit-progress-bar">
        <div class="unit-progress-fill--rose" style="width: 50%"></div>
      </div>
    </div>

    <div class="connector"><div class="connector-line"></div></div>

    <div class="lesson-list">

      <!-- Lesson 1: Completed -->
      <button class="lesson-btn" type="button">
        <div class="lesson-rim lesson-rim--rose"></div>
