<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Spring — MechPrep</title>
<style>
  body {
    margin: 0;
    background: #FAFAFA;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .card {
    background: white;
    border-radius: 20px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    padding: 40px;
    text-align: center;
  }
  h2 { color: #7B2FBE; margin-bottom: 8px; font-size: 20px; }
  p { color: #999; font-size: 14px; margin-bottom: 24px; }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<div class="card">
  <h2>Spring-Mass System</h2>
  <p>Squash &amp; stretch — spring stays connected</p>

  <svg viewBox="0 0 200 310" width="240" height="372" fill="none">
    <!-- Wall (top, fixed) -->
    <rect x="60" y="10" width="80" height="12" rx="3" fill="#CE82FF" opacity="0.3"/>
    <line x1="65" y1="10" x2="60" y2="2" stroke="#CE82FF" stroke-width="2" opacity="0.25"/>
    <line x1="80" y1="10" x2="75" y2="2" stroke="#CE82FF" stroke-width="2" opacity="0.25"/>
    <line x1="95" y1="10" x2="90" y2="2" stroke="#CE82FF" stroke-width="2" opacity="0.25"/>
    <line x1="110" y1="10" x2="105" y2="2" stroke="#CE82FF" stroke-width="2" opacity="0.25"/>
    <line x1="125" y1="10" x2="120" y2="2" stroke="#CE82FF" stroke-width="2" opacity="0.25"/>
    <line x1="140" y1="10" x2="135" y2="2" stroke="#CE82FF" stroke-width="2" opacity="0.25"/>

    <!-- Attachment point (fixed) -->
    <circle cx="100" cy="22" r="4" fill="#7B2FBE"/>

    <!-- SPRING: animated path that stretches from fixed top to moving mass -->
    <!-- The spring top is always at y=26, bottom animates between positions -->
    <polyline stroke="#CE82FF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <animate attributeName="points" dur="1.8s" repeatCount="indefinite"
        calcMode="spline"
        keyTimes="0;0.25;0.45;0.65;0.80;1"
        keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"
        values="
          100,26 100,34 82,46 118,58 82,70 118,82 82,94 118,106 82,118 118,130 100,142 100,148;
          100,26 100,38 82,54 118,70 82,86 118,102 82,118 118,134 82,150 118,166 100,178 100,183;
          100,26 100,32 82,42 118,52 82,62 118,72 82,82 118,92 82,102 118,112 100,122 100,126;
          100,26 100,37 82,51 118,65 82,79 118,93 82,107 118,121 82,135 118,149 100,163 100,168;
          100,26 100,33 82,44 118,55 82,66 118,77 82,88 118,99 82,110 118,121 100,132 100,137;
          100,26 100,34 82,46 118,58 82,70 118,82 82,94 118,106 82,118 118,130 100,142 100,148
        "/>
    </polyline>

    <!-- MASS BLOCK — bounces and squash/stretches -->
    <!-- Bounce position via translate, squash via scale -->
    <g>
      <!-- Translate: bounce up and down -->
      <animateTransform attributeName="transform" type="translate"
        dur="1.8s" repeatCount="indefinite"
        calcMode="spline"
        keyTimes="0;0.25;0.45;0.65;0.80;1"
        keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"
        values="0,0; 0,35; 0,-22; 0,20; 0,-10; 0,0"/>

      <!-- Squash/stretch wrapper (scales around mass center) -->
      <g style="transform-origin: 100px 170px">
        <animateTransform attributeName="transform" type="scale"
          dur="1.8s" repeatCount="indefinite"
          calcMode="spline"
          keyTimes="0;0.22;0.25;0.30;0.42;0.45;0.50;0.62;0.65;0.70;0.78;0.80;0.85;1"
          keySplines="0.4 0 0.2 1;0.3 0 0.7 1;0.4 0 0.2 1;0.4 0 0.2 1;0.3 0 0.7 1;0.4 0 0.2 1;0.4 0 0.2 1;0.3 0 0.7 1;0.4 0 0.2 1;0.4 0 0.2 1;0.3 0 0.7 1;0.4 0 0.2 1;0.4 0 0.2 1"
          values="
            1,1;
            1.02,0.98;
            1.18,0.82;
            0.88,1.14;
            0.90,1.12;
            0.85,1.18;
            1.10,0.90;
            1.02,0.98;
            1.12,0.88;
            0.92,1.10;
            0.96,1.05;
            0.96,1.05;
            1.02,0.98;
            1,1
          "/>

        <!-- Block body -->
        <rect x="72" y="148" width="56" height="44" rx="10" fill="#CE82FF" opacity="0.2"/>
        <rect x="72" y="148" width="56" height="44" rx="10" stroke="#7B2FBE" stroke-width="3" fill="none"/>

        <!-- Face — eyes -->
        <g>
          <circle cx="90" cy="166" r="3.5" fill="#7B2FBE"/>
          <circle cx="89" cy="164.5" r="1.2" fill="white"/>
          <circle cx="110" cy="166" r="3.5" fill="#7B2FBE"/>
          <circle cx="109" cy="164.5" r="1.2" fill="white"/>
          <!-- Blink: briefly flatten eyes -->
          <rect x="85" y="163" width="30" height="7" fill="white" opacity="0">
            <animate attributeName="opacity" values="0;0;1;0;0" dur="3.5s" repeatCount="indefinite"
              keyTimes="0;0.92;0.95;0.98;1"/>
          </rect>
          <ellipse cx="90" cy="166.5" rx="3.5" ry="1" fill="#7B2FBE" opacity="0">
            <animate attributeName="opacity" values="0;0;1;0;0" dur="3.5s" repeatCount="indefinite"
              keyTimes="0;0.92;0.95;0.98;1"/>
          </ellipse>
          <ellipse cx="110" cy="166.5" rx="3.5" ry="1" fill="#7B2FBE" opacity="0">
            <animate attributeName="opacity" values="0;0;1;0;0" dur="3.5s" repeatCount="indefinite"
              keyTimes="0;0.92;0.95;0.98;1"/>
          </ellipse>
        </g>

        <!-- Mouth -->
        <path d="M93,177 Q100,183 107,177" stroke="#7B2FBE" stroke-width="2.5" stroke-linecap="round" fill="none"/>

        <!-- Blush cheeks -->
        <circle cx="84" cy="174" r="4" fill="#E8B4FF" opacity="0.4"/>
        <circle cx="116" cy="174" r="4" fill="#E8B4FF" opacity="0.4"/>
      </g>
    </g>

    <!-- Shadow on ground — widens on squash -->
    <ellipse cx="100" cy="250" fill="#7B2FBE">
      <animate attributeName="rx" dur="1.8s" repeatCount="indefinite"
        calcMode="spline"
        keyTimes="0;0.25;0.45;0.65;0.80;1"
        keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"
        values="22;28;16;26;19;22"/>
      <animate attributeName="ry" dur="1.8s" repeatCount="indefinite"
        calcMode="spline"
        keyTimes="0;0.25;0.45;0.65;0.80;1"
        keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"
        values="4;6;2.5;5;3;4"/>
      <animate attributeName="opacity" dur="1.8s" repeatCount="indefinite"
        calcMode="spline"
        keyTimes="0;0.25;0.45;0.65;0.80;1"
        keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"
        values="0.12;0.20;0.06;0.17;0.08;0.12"/>
    </ellipse>

    <!-- Ground line (fixed) -->
    <line x1="40" y1="254" x2="160" y2="254" stroke="#CE82FF" stroke-width="2" opacity="0.15"/>

    <!-- k label -->
    <text x="66" y="90" text-anchor="end" fill="#7B2FBE" font-size="13" font-weight="bold" font-style="italic" font-family="serif" opacity="0.45">k</text>

    <!-- Formula -->
    <text x="100" y="285" text-anchor="middle" fill="#7B2FBE" font-size="14" font-weight="bold" font-family="serif" opacity="0.35">
      F = −kx
    </text>
  </svg>
</div>
</body>
</html>
