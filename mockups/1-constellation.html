<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constellation Layout</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0B0F1A;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .sky {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse at 30% 20%, #111833 0%, #0B0F1A 60%),
                radial-gradient(ellipse at 70% 80%, #0F1528 0%, transparent 50%);
  }
  .stars {
    position: fixed; inset: 0; z-index: 0;
  }
  .star-dot {
    position: absolute;
    width: 2px; height: 2px;
    background: #fff;
    border-radius: 50%;
    opacity: 0.3;
    animation: twinkle 3s ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.15; }
    50% { opacity: 0.6; }
  }

  .container {
    position: relative; z-index: 1;
    max-width: 420px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  h1 {
    text-align: center;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: #6B7DB3;
    margin-bottom: 40px;
  }

  /* Unit constellation */
  .constellation {
    position: relative;
    margin-bottom: 60px;
  }

  .constellation-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--unit-color);
    opacity: 0.7;
    margin-bottom: 6px;
  }
  .constellation-title {
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 30px;
    color: var(--unit-color);
  }

  .node-field {
    position: relative;
    min-height: 320px;
  }

  /* SVG connections */
  .connections {
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }
  .conn-line {
    stroke-width: 2;
    fill: none;
    opacity: 0.4;
  }
  .conn-line.active {
    opacity: 0.8;
    filter: drop-shadow(0 0 4px var(--unit-color));
  }
  .conn-line.locked {
    stroke-dasharray: 6 4;
    opacity: 0.15;
  }

  /* Lesson node */
  .node {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: transform 0.2s;
    z-index: 1;
  }
  .node:hover { transform: scale(1.1); }
  .node.locked { opacity: 0.35; cursor: default; }
  .node.locked:hover { transform: none; }

  .node-circle {
    width: 56px; height: 56px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    border: 3px solid var(--unit-color);
    background: #0B0F1A;
    position: relative;
    transition: all 0.3s;
  }
  .node.completed .node-circle {
    background: var(--unit-color);
    box-shadow: 0 0 20px color-mix(in srgb, var(--unit-color) 40%, transparent);
  }
  .node.current .node-circle {
    box-shadow: 0 0 0 4px color-mix(in srgb, var(--unit-color) 25%, transparent),
                0 0 30px color-mix(in srgb, var(--unit-color) 30%, transparent);
    animation: pulse-glow 2s ease-in-out infinite;
  }
  .node.locked .node-circle {
    border-color: #2A3050;
    background: #12162A;
  }

  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 0 4px color-mix(in srgb, var(--unit-color) 25%, transparent), 0 0 20px color-mix(in srgb, var(--unit-color) 20%, transparent); }
    50% { box-shadow: 0 0 0 8px color-mix(in srgb, var(--unit-color) 15%, transparent), 0 0 40px color-mix(in srgb, var(--unit-color) 35%, transparent); }
  }

  .node-label {
    font-size: 11px;
    font-weight: 600;
    text-align: center;
    max-width: 90px;
    line-height: 1.3;
    color: #8B9CC7;
  }
  .node.completed .node-label { color: #C5D0F0; }
  .node.current .node-label { color: #fff; }
  .node.locked .node-label { color: #3A4570; }

  /* Stars indicator */
  .node-stars {
    display: flex; gap: 2px;
    position: absolute;
    bottom: -6px;
  }
  .node-stars span {
    font-size: 10px;
  }

  /* Current badge */
  .go-badge {
    position: absolute;
    top: -8px; right: -8px;
    background: var(--unit-color);
    color: #fff;
    font-size: 9px;
    font-weight: 800;
    padding: 3px 7px;
    border-radius: 8px;
    letter-spacing: 1px;
    animation: pulse-glow 2s ease-in-out infinite;
  }

  /* Unit 1: blue */
  .unit-1 { --unit-color: #5B8DEF; }
  /* Unit 2: green */
  .unit-2 { --unit-color: #4ECB71; }
  /* Unit 3: purple */
  .unit-3 { --unit-color: #A78BFA; }
</style>
</head>
<body>
<div class="sky"></div>
<div class="stars" id="stars"></div>

<div class="container">
  <h1>✦ Constellation Map ✦</h1>

  <!-- UNIT 1 -->
  <div class="constellation unit-1">
    <div class="constellation-label">Unit 1</div>
    <div class="constellation-title">Statics & Forces</div>
    <div class="node-field">
      <svg class="connections" viewBox="0 0 380 320">
        <line class="conn-line active" x1="60" y1="40" x2="190" y2="90" stroke="#5B8DEF"/>
        <line class="conn-line active" x1="190" y1="90" x2="120" y2="180" stroke="#5B8DEF"/>
        <line class="conn-line active" x1="190" y1="90" x2="300" y2="170" stroke="#5B8DEF"/>
        <line class="conn-line active" x1="120" y1="180" x2="220" y2="270" stroke="#5B8DEF"/>
      </svg>

      <div class="node completed" style="left: 30px; top: 10px;">
        <div class="node-circle">⚖️
          <div class="node-stars"><span>⭐</span><span>⭐</span><span>⭐</span></div>
        </div>
        <div class="node-label">Free Body Diagrams</div>
      </div>

      <div class="node completed" style="left: 160px; top: 60px;">
        <div class="node-circle">🔗
          <div class="node-stars"><span>⭐</span><span>⭐</span></div>
        </div>
        <div class="node-label">Equilibrium</div>
      </div>

      <div class="node current" style="left: 90px; top: 150px;">
        <div class="node-circle">📐
          <div class="go-badge">GO</div>
        </div>
        <div class="node-label">Moment of Force</div>
      </div>

      <div class="node completed" style="left: 270px; top: 140px;">
        <div class="node-circle">🧲
          <div class="node-stars"><span>⭐</span><span>⭐</span><span>⭐</span></div>
        </div>
        <div class="node-label">Friction</div>
      </div>

      <div class="node locked" style="left: 190px; top: 240px;">
        <div class="node-circle">🏗️</div>
        <div class="node-label">Trusses</div>
      </div>
    </div>
  </div>

  <!-- UNIT 2 -->
  <div class="constellation unit-2">
    <div class="constellation-label">Unit 2</div>
    <div class="constellation-title">Strength of Materials</div>
    <div class="node-field">
      <svg class="connections" viewBox="0 0 380 320">
        <line class="conn-line locked" x1="190" y1="40" x2="80" y2="140" stroke="#4ECB71"/>
        <line class="conn-line locked" x1="190" y1="40" x2="300" y2="130" stroke="#4ECB71"/>
        <line class="conn-line locked" x1="80" y1="140" x2="200" y2="240" stroke="#4ECB71"/>
        <line class="conn-line locked" x1="300" y1="130" x2="200" y2="240" stroke="#4ECB71"/>
      </svg>

      <div class="node locked" style="left: 160px; top: 10px;">
        <div class="node-circle">📏</div>
        <div class="node-label">Stress & Strain</div>
      </div>
      <div class="node locked" style="left: 50px; top: 110px;">
        <div class="node-circle">🔩</div>
        <div class="node-label">Axial Loading</div>
      </div>
      <div class="node locked" style="left: 270px; top: 100px;">
        <div class="node-circle">〰️</div>
        <div class="node-label">Beam Bending</div>
      </div>
      <div class="node locked" style="left: 170px; top: 210px;">
        <div class="node-circle">🌀</div>
        <div class="node-label">Torsion</div>
      </div>
    </div>
  </div>

  <!-- UNIT 3 -->
  <div class="constellation unit-3">
    <div class="constellation-label">Unit 3</div>
    <div class="constellation-title">Thermodynamics</div>
    <div class="node-field" style="min-height: 260px;">
      <svg class="connections" viewBox="0 0 380 260">
        <line class="conn-line locked" x1="80" y1="50" x2="280" y2="50" stroke="#A78BFA"/>
        <line class="conn-line locked" x1="280" y1="50" x2="180" y2="170" stroke="#A78BFA"/>
        <line class="conn-line locked" x1="80" y1="50" x2="180" y2="170" stroke="#A78BFA"/>
      </svg>

      <div class="node locked" style="left: 50px; top: 20px;">
        <div class="node-circle">🔥</div>
        <div class="node-label">First Law</div>
      </div>
      <div class="node locked" style="left: 250px; top: 20px;">
        <div class="node-circle">❄️</div>
        <div class="node-label">Second Law</div>
      </div>
      <div class="node locked" style="left: 150px; top: 140px;">
        <div class="node-circle">♨️</div>
        <div class="node-label">Carnot Cycle</div>
      </div>
    </div>
  </div>
</div>

<script>
  // Generate random background stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const dot = document.createElement('div');
    dot.className = 'star-dot';
    dot.style.left = Math.random() * 100 + '%';
    dot.style.top = Math.random() * 100 + '%';
    dot.style.animationDelay = Math.random() * 3 + 's';
    dot.style.width = dot.style.height = (Math.random() * 2 + 1) + 'px';
    starsEl.appendChild(dot);
  }
</script>
</body>
</html>
